<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON | Games</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* GLOBAL RESET */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background: #050505;
    color: white; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* PREMIUM BACKGROUND ANIMATION */
  .bg-wrapper {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% -20%, #1a2a2f, #050505);
    z-index: -1;
  }

  /* GLASS NAVBAR */
  header {
    width: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  nav { 
    max-width: 1400px;
    margin: 0 auto;
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 18px 25px;
  }
  
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .logo-link img { height: 45px; margin-right: 15px; border-radius: 8px; filter: drop-shadow(0 0 10px rgba(0, 255, 213, 0.3)); }
  .logo-link h1 { color: #fff; margin: 0; font-size: 24px; letter-spacing: 3px; font-weight: 900; }
  
  .nav-links { display: flex; gap: 25px; }
  .nav-links a { 
    color: rgba(255, 255, 255, 0.7); 
    text-decoration: none; 
    font-weight: 600; 
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.3s; 
    padding: 5px 0;
    border-bottom: 2px solid transparent;
  }
  /* لاحظ هنا خلينا الكلاس active على زر الألعاب */
  .nav-links a:hover, .nav-links a.active { color: #00ffd5; border-bottom-color: #00ffd5; }

  /* AUTH SECTION */
  .auth-section {
    max-width: 1400px;
    margin: 20px auto 0;
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding: 0 25px;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.03);
    padding: 8px 20px;
    border-radius: 40px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    gap: 15px;
    transition: 0.3s;
  }
  .login-card:hover { border-color: #00ffd5; background: rgba(0, 255, 213, 0.05); }

  .auth-btn { background: none; border: none; color: white; cursor: pointer; font-size: 20px; transition: 0.2s; }
  .auth-btn.google:hover { color: #db4437; }
  .auth-btn.github:hover { color: #00ffd5; }

  .profile-ui { display: none; align-items: center; gap: 12px; cursor: pointer; }
  .profile-ui img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #00ffd5; }
  .profile-ui span { font-weight: bold; font-size: 14px; }

  .profile-modal {
    display: none;
    position: absolute;
    top: 80px;
    right: 25px;
    background: #0a0a0a;
    border: 1px solid #333;
    padding: 25px;
    border-radius: 12px;
    width: 280px;
    z-index: 1001;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
  }

  /* COMING SOON SECTION & ANIMATION */
  .soon-container {
    flex: 1; /* تأخذ المساحة المتبقية لتتوسط الشاشة */
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .soon-text {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0, 255, 213, 0.3);
    display: flex;
    align-items: baseline;
  }

  /* أنيميشن النقاط (تصاعدي وتنازلي) */
  .dots {
    display: inline-flex;
    margin-left: 5px;
  }

  .dot-anim {
    color: #00ffd5;
    animation: bounce 1.5s infinite;
  }

  /* تأخير الأنيميشن لكل نقطة حتى يصير شكل موجة */
  .dot-anim:nth-child(1) { animation-delay: 0s; }
  .dot-anim:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 20%, 50%, 100% { transform: translateY(0); }
    40% { transform: translateY(-15px); } /* ارتفاع النقطة */
    60% { transform: translateY(-7px); }
  }

  /* FOOTER STYLES */
  footer { 
    text-align: center; 
    padding: 30px; 
    color: #555; 
    font-size: 13px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    border-top: 1px solid rgba(255,255,255,0.05);
    background: rgba(0,0,0,0.5);
    width: 100%;
  }

  .footer-content {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }

  .footer-content img {
    height: 25px;
    border-radius: 4px;
    filter: grayscale(100%);
    transition: 0.3s;
  }

  .footer-content:hover img {
    filter: grayscale(0%);
    box-shadow: 0 0 10px rgba(0, 255, 213, 0.3);
  }

  @media (max-width: 768px) {
    nav { flex-direction: column; gap: 20px; }
    .footer-content { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="bg-wrapper"></div>

<header>
  <nav>
    <a href="index.html" class="logo-link">
      <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">
      <h1>NEXAURON</h1>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="games.html" class="active">Games</a>
      <a href="team.html">Team</a>
      <a href="support.html">Support</a>
    </div>
  </nav>
</header>

<main>
  <div class="auth-section">
    <div class="login-card" id="loginUI">
      <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666;">Account</span>
      <button class="auth-btn google" id="googleLogin" title="Login with Google"><i class="fab fa-google"></i></button>
      <button class="auth-btn github" id="githubLogin" title="Login with GitHub"><i class="fab fa-github"></i></button>
    </div>

    <div class="profile-ui" id="profileUI" onclick="toggleModal()">
      <span id="displayUserName">...</span>
      <img id="userPhoto" src="" alt="Profile">
    </div>

    <div class="profile-modal" id="profileModal">
      <h3 id="modalName">...</h3>
      <p style="color: #00ffd5; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;">Official Developer</p>
      <hr style="margin: 15px 0; border: 0; border-top: 1px solid #222;">
      <p id="userJoinDate"><strong>Joined:</strong> --</p>
      <button id="logoutBtn" style="width:100%; margin-top:20px; background:#fff; border:none; color:#000; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; text-transform: uppercase;">Sign Out</button>
    </div>
  </div>

  <div class="soon-container">
    <h1 class="soon-text">
      Games Soon
      <span class="dots">
        <span class="dot-anim">.</span>
        <span class="dot-anim">.</span>
        <span class="dot-anim">.</span>
      </span>
    </h1>
  </div>
</main>

<footer>
  <div class="footer-content">
    <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Icon">
    <span>© 2026 NEXAURON Studios - All Rights Reserved</span>
  </div>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, GithubAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAvZJhoEzwwWeVmUpKzyi-d-Rj7kOH7DE",
    authDomain: "nexauron-web.firebaseapp.com",
    projectId: "nexauron-web",
    storageBucket: "nexauron-web.firebasestorage.app",
    messagingSenderId: "1043958705578",
    appId: "1:1043958705578:web:00c6d0bc05dc1bfdca8fd3",
    measurementId: "G-FBRBXV7259"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  const githubProvider = new GithubAuthProvider();

  const loginUI = document.getElementById('loginUI');
  const profileUI = document.getElementById('profileUI');
  const profileModal = document.getElementById('profileModal');
  const displayUserName = document.getElementById('displayUserName');
  const userPhoto = document.getElementById('userPhoto');
  const modalName = document.getElementById('modalName');
  const userJoinDate = document.getElementById('userJoinDate');

  document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, googleProvider);
  document.getElementById('githubLogin').onclick = () => signInWithPopup(auth, githubProvider);
  document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginUI.style.display = 'none';
      profileUI.style.display = 'flex';
      displayUserName.innerText = user.displayName;
      modalName.innerText = user.displayName;
      userPhoto.src = user.photoURL;
      const date = new Date(user.metadata.creationTime);
      userJoinDate.innerHTML = `<strong>Joined:</strong> ${date.toLocaleDateString()}`;
    } else {
      loginUI.style.display = 'flex';
      profileUI.style.display = 'none';
    }
  });

  window.toggleModal = () => {
    profileModal.style.display = (profileModal.style.display === 'block') ? 'none' : 'block';
  };

  window.onclick = (e) => {
    if (!e.target.closest('#profileUI') && !e.target.closest('#profileModal')) {
      profileModal.style.display = 'none';
    }
  };
</script>

</body>
</html>
