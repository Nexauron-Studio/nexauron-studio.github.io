<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON | Games</title>
<style>
  /* انسخ الـ CSS الأساسي للنافبار والخلفية هنا */
  body { margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #0f2027, #000000); color: white; min-height: 100vh; }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(0, 0, 0, 0.9); border-bottom: 1px solid #00ffd533; }
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .logo-link img { height: 50px; margin-right: 15px; border-radius: 8px; }
  .logo-link h1 { color: #00ffd5; margin: 0; font-size: 26px; letter-spacing: 2px; }
  .nav-links { display: flex; gap: 15px; }
  .nav-links a { color: white; text-decoration: none; font-weight: bold; padding: 10px 25px; border: 2px solid #00ffd5; border-radius: 10px; transition: all 0.3s ease; }
  .nav-links a:hover { background: #00ffd5; color: black; box-shadow: 0 0 15px rgba(0, 255, 213, 0.5); transform: translateY(-2px); }
  
  /* GAMES STYLES */
  .section { padding: 80px 20px; text-align: center; }
  .games-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 40px; }
  .card { background: #111; width: 320px; border-radius: 20px; overflow: hidden; transition: 0.4s; border: 1px solid #333; }
  .card:hover { transform: scale(1.05); border-color: #00ffd5; box-shadow: 0 0 30px rgba(0, 255, 213, 0.1); }
  .card img { width: 100%; height: 200px; object-fit: cover; background: #000; }
  .card h3 { margin: 20px 10px 5px; color: #00ffd5; }
  .card p { color: #ccc; font-size: 14px; margin: 0 15px 15px; line-height: 1.6; }
  .badge { display: inline-block; background: #ff0050; color: white; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
  .btn { display: inline-block; margin: 10px; padding: 10px 25px; background: #00ffd5; color: black; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
  .btn:hover { background: white; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-link">
    <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">
    <h1>NEXAURON</h1>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="team.html">Team</a>
    <a href="support.html">Support</a>
  </div>
</nav>

<div class="section">
  <h2 style="font-size: 40px; color: #00ffd5;">🎮 Our Games</h2>
  <div class="games-container">
    <div class="card">
      <img src="https://via.placeholder.com/400/200/111/00ffd5?text=Zombie+Fight+Logo" alt="Zombie Fight">
      <h3>Zombie Fight</h3>
      <p>An intense survival horror experience pushing the boundaries of tension and atmosphere.</p>
      <span class="badge">In Development 🛠️</span><br>
      <a class="btn" href="#">Steam Page Soon</a>
    </div>
  </div>
</div>

</body>
</html>
