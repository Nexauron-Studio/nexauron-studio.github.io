<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON</title>

<style>

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #000000);
  color: white;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  background: rgba(0,0,0,0.7);
  position:sticky;
  top:0;
}

nav h1 {
  color:#00ffd5;
}

nav a {
  color:white;
  margin-left:15px;
  text-decoration:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:60px;
  color:#00ffd5;
}

.hero p {
  color:#aaa;
  margin-top:10px;
}

/* SECTION */
.section {
  padding:50px 20px;
  text-align:center;
}

/* GAME CARDS */
.games {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:#111;
  margin:15px;
  width:260px;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
}

.card h3 {
  margin:10px;
}

.card p {
  color:#aaa;
}

.btn {
  display:inline-block;
  margin:10px;
  padding:10px 15px;
  background:#00ffd5;
  color:black;
  border-radius:8px;
  text-decoration:none;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#000;
  color:#777;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>NEXAURON</h1>
  <div>
    <a href="#">Games</a>
    <a href="#">Team</a>
    <a href="#">Support</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>NEXAURON</h1>
  <p>Future of Gaming Starts Here</p>
</div>

<!-- GAMES -->
<div class="section">
  <h2>🎮 Our Games</h2>

  <div class="games">

    <div class="card">
      <img src="https://picsum.photos/300/200">
      <h3>Game One</h3>
      <p>Coming Soon</p>
      <a class="btn" href="#">Play</a>
    </div>

    <div class="card">
      <img src="https://picsum.photos/301/200">
      <h3>Game Two</h3>
      <p>Coming Soon</p>
      <a class="btn" href="#">Play</a>
    </div>

  </div>
</div>

<!-- TEAM -->
<div class="section">
  <h2>👥 Team</h2>
  <p>Founder: You</p>
</div>

<!-- SUPPORT -->
<div class="section">
  <h2>☕ Support Us</h2>
  <a class="btn" href="#">Donate</a>
</div>

<!-- FOOTER -->
<footer>
  © 2026 NEXAURON - All Rights Reserved
</footer>

</body>
</html>
