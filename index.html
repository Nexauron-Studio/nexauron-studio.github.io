<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXAURON | Official Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* GLOBAL RESET */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
    background: #050505;
    color: white; 
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  main { flex: 1; display: flex; flex-direction: column; }

  /* PREMIUM BACKGROUND */
  .bg-wrapper {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% -20%, #1a2a2f, #050505);
    z-index: -1;
  }

  /* GLASS NAVBAR */
  header {
    width: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000;
  }
  nav { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; }
  .logo-link { display: flex; align-items: center; text-decoration: none; }
  .logo-link img { height: 45px; margin-right: 15px; border-radius: 8px; filter: drop-shadow(0 0 10px rgba(0, 255, 213, 0.3)); }
  .logo-link h1 { color: #fff; margin: 0; font-size: 24px; letter-spacing: 3px; font-weight: 900; }
  .nav-links { display: flex; gap: 25px; }
  .nav-links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; padding: 5px 0; border-bottom: 2px solid transparent; }
  .nav-links a:hover, .nav-links a.active { color: #00ffd5; border-bottom-color: #00ffd5; }

  /* AUTH SECTION */
  .auth-section { max-width: 1400px; margin: 20px auto 0; width: 100%; display: flex; justify-content: flex-end; padding: 0 25px; position: relative; }
  #showLoginBtn:hover { background: rgba(0, 255, 213, 0.1) !important; border-color: #00ffd5 !important; }
  .profile-ui { display: none; align-items: center; gap: 12px; cursor: pointer; }
  .profile-ui img { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #00ffd5; object-fit: cover;}
  .profile-ui span { font-weight: bold; font-size: 14px; }
  .profile-modal { display: none; position: absolute; top: 60px; right: 25px; background: #0a0a0a; border: 1px solid #333; padding: 25px; border-radius: 12px; width: 280px; z-index: 1001; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }

  /* HERO SECTION */
  .hero { text-align: center; padding: 5vh 20px 5vh; }
  .main-title { font-size: clamp(50px, 12vw, 100px); font-weight: 900; letter-spacing: -2px; background: linear-gradient(to bottom, #ffffff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; display: inline-block; }
  .hero p { font-size: 1.1rem; color: #888; max-width: 800px; margin: 0 auto 30px; font-weight: 300; line-height: 1.6; }

  /* SLIDER */
  .slider-container { max-width: 1100px; margin: 0 auto 40px; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 30px 60px rgba(0,0,0,0.8); aspect-ratio: 16 / 9; background: #000; }
  .slider-wrapper { display: flex; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.65, 0, 0.35, 1); }
  .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: black; }
  .slide img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
  .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); padding: 18px; cursor: pointer; border-radius: 50%; font-size: 20px; transition: 0.3s; z-index: 10; }
  .slider-btn:hover { background: #00ffd5; color: #000; border-color: #00ffd5; transform: translateY(-50%) scale(1.1); }
  .slider-btn.prev { left: 25px; } .slider-btn.next { right: 25px; }
  .slider-dots { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
  .dot { width: 12px; height: 12px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; cursor: pointer; transition: 0.3s; }
  .dot.active { background: #00ffd5; box-shadow: 0 0 15px rgba(0, 255, 213, 0.8); width: 30px; border-radius: 6px; }

  /* FOOTER */
  footer { text-align: center; padding: 40px; color: #444; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.8); width: 100%; }
  .footer-content { display: flex; justify-content: center; align-items: center; gap: 15px; }
  .footer-content img { height: 30px; border-radius: 5px; opacity: 0.5; transition: 0.3s; }
  .footer-content:hover img { opacity: 1; filter: drop-shadow(0 0 8px #00ffd5); }

  @media (max-width: 768px) {
    nav { flex-direction: column; gap: 15px; padding: 15px; }
    .slider-container { aspect-ratio: 16 / 10; }
    .slider-btn { padding: 12px; font-size: 16px; }
    .login-card { width: 90% !important; right: 5% !important; top: 130px !important; }
  }
</style>
</head>
<body>

<div class="bg-wrapper"></div>

<header>
  <nav>
    <a href="index.html" class="logo-link">
      <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Logo">
      <h1>NEXAURON</h1>
    </a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="games.html">Games</a>
      <a href="team.html">Team</a>
      <a href="support.html">Support</a>
    </div>
  </nav>
</header>

<main>
  <div class="auth-section">
    <button id="showLoginBtn" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; letter-spacing: 1px; transition: 0.3s; z-index: 999;">SIGN IN</button>

    <div class="login-card" id="loginUI" style="flex-direction: column; align-items: flex-start; padding: 30px; border-radius: 20px; width: 340px; position: absolute; top: 70px; right: 25px; display: none; background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,1); border: 1px solid rgba(0, 255, 213, 0.3); z-index: 1000;">
      <span style="font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #00ffd5; margin-bottom: 25px; font-weight: 900; display: block; width: 100%; text-align: center;">NEXAURON ID</span>
      <input type="email" id="emailInput" placeholder="Email Address" style="width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; outline: none;">
      <input type="password" id="passInput" placeholder="Password" style="width: 100%; padding: 14px; margin-bottom: 25px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; outline: none;">
      <button id="emailLoginBtn" style="width: 100%; padding: 14px; background: #00ffd5; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-bottom: 20px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;">Enter Portal</button>
      <div style="display: flex; gap: 12px; width: 100%;">
        <button id="googleLogin" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 14px;"><i class="fab fa-google"></i> Google</button>
        <button id="guestLogin" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 14px;"><i class="fas fa-user-secret"></i> Guest</button>
      </div>
    </div>

    <div class="profile-ui" id="profileUI" onclick="toggleModal()">
      <span id="displayUserName">...</span>
      <img id="userPhoto" src="" alt="Profile">
    </div>
    <div class="profile-modal" id="profileModal">
      <h3 id="modalName" style="margin-bottom: 5px;">...</h3>
      <p style="color: #00ffd5; font-weight: 900; text-transform: uppercase; font-size: 10px; letter-spacing: 2px;">Authenticated Player</p>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
      <button id="logoutBtn" style="width:100%; background:#fff; border:none; color:#000; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold; text-transform: uppercase;">Log Out</button>
    </div>
  </div>

  <div class="hero">
    <h1 class="main-title">NEXAURON</h1>
    <p>Engineering epic worlds and immersive experiences across all genres. From independent visions to global scales.</p>
    
    <div class="slider-container">
      <div class="slider-wrapper" id="sliderWrapper">
        <div class="slide"><img src="https://tooltop.cloud/img/zgmk03Z2" alt="Slide 1"></div>
        <div class="slide"><img src="https://tooltop.cloud/img/HUsSS1fS" alt="Slide 2"></div>
        <div class="slide"><img src="https://tooltop.cloud/img/mLyBpNvT" alt="Slide 3"></div>
        <div class="slide"><img src="https://tooltop.cloud/img/qJn6jduH" alt="Slide 4"></div>
      </div>
      <button class="slider-btn prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
      <button class="slider-btn next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
      <div class="slider-dots" id="sliderDots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-content">
    <img src="https://tooltop.cloud/img/YZluw8KD" alt="NEXAURON Icon">
    <span>© 2026 NEXAURON Studios - Developed by Montzer Raad</span>
  </div>
</footer>

<script type="module">
  // FIREBASE CONFIG & AUTH & ANALYTICS
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAAvZJhoEzwwWeVmUpKzyi-d-Rj7kOH7DE",
    authDomain: "nexauron-web.firebaseapp.com",
    projectId: "nexauron-web",
    storageBucket: "nexauron-web.firebasestorage.app",
    messagingSenderId: "1043958705578",
    appId: "1:1043958705578:web:00c6d0bc05dc1bfdca8fd3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  // --- UI LOGIC ---
  const showLoginBtn = document.getElementById('showLoginBtn');
  const loginUI = document.getElementById('loginUI');
  const profileUI = document.getElementById('profileUI');
  const displayUserName = document.getElementById('displayUserName');
  const userPhoto = document.getElementById('userPhoto');
  const modalName = document.getElementById('modalName');

  showLoginBtn.onclick = () => { loginUI.style.display = loginUI.style.display === 'flex' ? 'none' : 'flex'; };

  document.getElementById('googleLogin').onclick = () => signInWithPopup(auth, provider).catch(err => alert(err.message));
  document.getElementById('guestLogin').onclick = () => signInAnonymously(auth).catch(err => alert(err.message));

  document.getElementById('emailLoginBtn').onclick = () => {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;
    if(!email || !pass) return alert("Please enter email & password.");
    signInWithEmailAndPassword(auth, email, pass).catch(err => {
      if (err.code === 'auth/invalid-credential') {
        createUserWithEmailAndPassword(auth, email, pass).then(() => alert("Welcome to NEXAURON! Account Created.")).catch(e => alert(e.message));
      } else alert(err.message);
    });
  };

  document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

  onAuthStateChanged(auth, (user) => {
    if (user) {
      showLoginBtn.style.display = 'none'; loginUI.style.display = 'none'; profileUI.style.display = 'flex';
      let name = user.displayName || user.email.split('@')[0];
      let img = user.photoURL || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
      if(user.isAnonymous) { name = "Guest Player"; img = "https://cdn-icons-png.flaticon.com/512/1144/1144760.png"; }
      displayUserName.innerText = name; modalName.innerText = name; userPhoto.src = img;
    } else {
      showLoginBtn.style.display = 'block'; profileUI.style.display = 'none';
    }
  });

  window.toggleModal = () => { const m = document.getElementById('profileModal'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; };
  window.onclick = (e) => {
    if (!e.target.closest('#loginUI') && !e.target.closest('#showLoginBtn')) loginUI.style.display = 'none';
    if (!e.target.closest('#profileUI') && !e.target.closest('#profileModal')) document.getElementById('profileModal').style.display = 'none';
  };

  // --- SLIDER ENGINE ---
  const wrapper = document.getElementById('sliderWrapper');
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  let currentIndex = 0; let slideInterval;

  function updateSlider(index) {
    wrapper.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach(d => d.classList.remove('active')); dots[index].classList.add('active');
    currentIndex = index;
  }
  function start() { slideInterval = setInterval(() => updateSlider((currentIndex + 1) % slides.length), 5000); }
  function stop() { clearInterval(slideInterval); }

  document.getElementById('nextBtn').onclick = () => { updateSlider((currentIndex + 1) % slides.length); stop(); start(); };
  document.getElementById('prevBtn').onclick = () => { updateSlider((currentIndex - 1 + slides.length) % slides.length); stop(); start(); };
  dots.forEach((d, i) => d.onclick = () => { updateSlider(i); stop(); start(); });
  document.querySelector('.slider-container').onmouseenter = stop; document.querySelector('.slider-container').onmouseleave = start;
  start();

  // --- ANALYTICS (VIEW TRACKER) ---
  async function trackVisit() {
    if (!localStorage.getItem("nexauron_visited")) {
      const statsRef = doc(db, "analytics", "views");
      try {
        const docSnap = await getDoc(statsRef);
        if (!docSnap.exists()) await setDoc(statsRef, { count: 1 });
        else await updateDoc(statsRef, { count: increment(1) });
        localStorage.setItem("nexauron_visited", "true");
      } catch (e) { console.error("Tracking Error: ", e); }
    }
  }
  trackVisit();
</script>

</body>
</html>
